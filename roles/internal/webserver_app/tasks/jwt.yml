---

- name: Create JWT Key Path
  file:
    state: directory
    path: "{{ webserver_app_jwt_key_path }}"
    owner: "{{ webserver_app_user }}"
    group: "{{ webserver_app_user }}"
    mode: "0740"

- name: Get SSL keys
  include_role:
    name: Islandora-Devops.keymaster
  vars:
    ssl_key_private_output_path: "{{ webserver_app_jwt_key_path }}/private.key"

- name: Create JWT Config Path
  file:
    state: directory
    path: "{{ webserver_app_jwt_config_path }}"
    owner: "{{ webserver_app_user }}"
    group: "{{ webserver_app_user }}"
    mode: "0740"

- name: Copy Templated Drupal JWT Configuration
  template:
    src: "{{ item }}"
    dest: "{{ webserver_app_jwt_config_path }}/{{ item }}"
    owner: "{{ webserver_app_user }}"
    group: "{{ webserver_app_user }}"
    mode: "0740"
  with_items:
    - jwt.config.yml
    - key.key.islandora_rsa_key.yml
  register: drupal_jwt_config

- name: Get YUDL Groups
  git:
    repo: https://github.com/yorkulibraries/yudl_groups.git
    dest: "{{ drupal_core_path }}/modules/contrib/yudl_groups"
    version: 2.x

- name: Gather list of enabled modules
  command: "{{ drush_path }} --root {{ drupal_core_path }} pml --status=enabled --type=module --format=list"
  register: enabled_modules
  changed_when: false

- name: Enable YUDL Groups
  command: "{{ drush_path }} --root {{ drupal_core_path }} -y en yudl_groups"
  when: "'yudl_groups' not in (enabled_modules.stdout_lines | default([]))"

###
# Install this here since we run into a composer wanting stable over dev issue.
- name: Get Islandora Group
  git:
    repo: https://github.com/digitalutsc/islandora_group.git
    dest: "{{ drupal_core_path }}/modules/contrib/islandora_group"
    version: 2.x

- name: Enable Islandora Group
  command: "{{ drush_path }} --root {{ drupal_core_path }} -y en islandora_group"
  when: "'islandora_group' not in (enabled_modules.stdout_lines | default([]))"

- name: Get Group Solr
  git:
    repo: https://github.com/yorkulibraries/group_solr.git
    dest: "{{ drupal_core_path }}/modules/contrib/group_solr"
    version: main

- name: Enable Group Solr
  command: "{{ drush_path }} --root {{ drupal_core_path }} -y en group_solr"
  when: "'group_solr' not in (enabled_modules.stdout_lines | default([]))"
###

- name: Import JWT Config Into Drupal
  command: "{{ drush_path }} --root {{ drupal_core_path }} config-import -y --partial --source={{ webserver_app_jwt_config_path }}"
  when: drupal_jwt_config.changed is defined and drupal_jwt_config.changed

- name: Calculate hash of YUDL optional config source
  shell: >
    find /var/www/html/drupal/web/modules/contrib/yudl_defaults/config/optional
    -type f -name '*.yml' -print0 |
    sort -z |
    xargs -0 sha256sum |
    sha256sum |
    awk '{print $1}'
  register: yudl_optional_config_hash
  changed_when: false

- name: Check optional config hash marker
  stat:
    path: /var/www/html/drupal/.yudl_optional_config.sha256
  register: yudl_optional_config_hash_marker

- name: Read optional config hash marker
  slurp:
    path: /var/www/html/drupal/.yudl_optional_config.sha256
  register: yudl_optional_config_hash_current
  when: yudl_optional_config_hash_marker.stat.exists

- name: Set current optional config hash fact
  set_fact:
    yudl_optional_config_hash_previous: "{{ (yudl_optional_config_hash_current.content | b64decode | trim) if yudl_optional_config_hash_marker.stat.exists else '' }}"

- name: Import YUDL features moved to optional
  command: "{{ drush_path }} --root {{ drupal_core_path }} -y cim --partial --source=/var/www/html/drupal/web/modules/contrib/yudl_defaults/config/optional"
  when: yudl_optional_config_hash.stdout | trim != yudl_optional_config_hash_previous

- name: Update optional config hash marker
  copy:
    dest: /var/www/html/drupal/.yudl_optional_config.sha256
    content: "{{ yudl_optional_config_hash.stdout | trim }}\n"
    owner: "{{ webserver_app_user }}"
    group: "{{ webserver_app_user }}"
    mode: "0644"
  when: yudl_optional_config_hash.stdout | trim != yudl_optional_config_hash_previous
