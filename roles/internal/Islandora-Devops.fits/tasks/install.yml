---

- name: Create FITS destination dir
  file:
    path: "{{ fits_install_root }}/fits-{{ fits_version }}"
    state: directory
    owner: "{{ fits_user }}"
    group: "{{ fits_group }}"
    mode: "0700"

- name: Downloading FITS executables
  get_url:
    url: "{{ fits_src_url }}"
    dest: "{{ fits_install_root }}/fits-{{ fits_version }}"
    mode: "0755"
    checksum: "{{ fits_zip_md5sum }}"
    force: false
  retries: 5
  register: result
  until: result is succeeded

- name: Unzip FITS
  unarchive:
    src: "{{ fits_install_root }}/fits-{{ fits_version }}/fits-{{ fits_version }}.zip"
    dest: "{{ fits_install_root }}/fits-{{ fits_version }}"
    remote_src: true
    creates: "{{ fits_install_root }}/fits-{{ fits_version }}/fits.sh"

- name: Check current FITS symlink path
  stat:
    path: "{{ fits_install_symlink }}"
    follow: false
  register: fits_symlink

- name: Remove incorrect FITS symlink/path
  file:
    path: "{{ fits_install_symlink }}"
    state: absent
  when: >
    fits_symlink.stat.exists and
    (
      (not fits_symlink.stat.islnk) or
      fits_symlink.stat.lnk_source != (fits_install_root ~ '/fits-' ~ fits_version)
    )

- name: Ensure FITS symlink is correct
  file:
    state: link
    src: "{{ fits_install_root }}/fits-{{ fits_version }}"
    dest: "{{ fits_install_symlink }}"
    owner: "{{ fits_user }}"
    group: "{{ fits_group }}"
    force: true
